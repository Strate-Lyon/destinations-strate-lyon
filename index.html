<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartographie des Stratos — Strate Lyon</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0E0E10;
    --bg-panel: #161619;
    --bg-card: #1E1E22;
    --bg-hover: #26262B;
    --border: #2A2A30;
    --text-primary: #F0EDE8;
    --text-secondary: #8A8A95;
    --text-muted: #5A5A65;
    --accent-stage: #5EBD8C;
    --accent-exchange: #6FA3EF;
    --accent-alumni: #A78BFA;
    --accent-title: #E8A85F;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --panel-left-w: 420px;
    --panel-right-w: 360px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); overflow: hidden; height: 100vh; width: 100vw; }
  #map { position: absolute; inset: 0; z-index: 0; }

  /* ── Shared Panel Base ─────────────────── */
  .panel-base {
    position: absolute; top: 20px; bottom: 20px;
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px;
    z-index: 10; display: flex; flex-direction: column; overflow: hidden;
    backdrop-filter: blur(30px); box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ── Left Panel ────────────────────────── */
  .panel-left { left: 20px; width: var(--panel-left-w); overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .panel-left.collapsed { transform: translateX(calc(-100% - 30px)); }

  /* ── Right Panel ───────────────────────── */
  .panel-right { right: 20px; width: var(--panel-right-w); }
  .panel-right.collapsed { transform: translateX(calc(100% + 30px)); }

  /* ── Toggle Buttons ────────────────────── */
  .toggle-btn {
    position: absolute; top: 28px; z-index: 11; width: 40px; height: 40px;
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text-secondary); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .toggle-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  #toggleLeft { left: calc(var(--panel-left-w) + 30px); }
  .panel-left.collapsed ~ #toggleLeft { left: 20px; }
  #toggleRight { right: calc(var(--panel-right-w) + 30px); }
  .panel-right.collapsed ~ #toggleRight { right: 20px; }

  /* ── Header ────────────────────────────── */
  .panel-header { padding: 28px 24px 0; }
  .panel-header h1 { font-family: var(--font-display); font-size: 26px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.15; white-space: nowrap; }
  .panel-header h1 em { font-style: italic; color: var(--accent-title); }
  .panel-header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 300; }

  /* ── Stats ──────────────────────────────── */
  .stats-row { display: flex; gap: 6px; padding: 14px 24px 0; }
  .stat-card { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 10px; }
  .stat-card .number { font-family: var(--font-display); font-size: 22px; line-height: 1; margin-bottom: 3px; }
  .stat-card .label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .stat-card.stages .number { color: var(--accent-stage); }
  .stat-card.exchanges .number { color: var(--accent-exchange); }
  .stat-card.alumni .number { color: var(--accent-alumni); }

  /* ── Filters ───────────────────────────── */
  .filters { padding: 16px 24px 12px; }
  .filter-group { margin-bottom: 12px; }
  .filter-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 500; margin-bottom: 7px; }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 400; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
  .chip:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .chip.active { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); font-weight: 500; }
  .chip.active.stage-chip { background: var(--accent-stage); border-color: var(--accent-stage); color: var(--bg-primary); }
  .chip.active.exchange-chip { background: var(--accent-exchange); border-color: var(--accent-exchange); color: var(--bg-primary); }
  .chip.active.alumni-chip { background: var(--accent-alumni); border-color: var(--accent-alumni); color: var(--bg-primary); }

  /* ── School Banner ─────────────────────── */
  .school-banner { padding: 12px 24px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); text-align: center; margin-top: auto; flex-shrink: 0; }

  /* ── Right Panel Header ────────────────── */
  .list-panel-header { padding: 24px 24px 12px; flex-shrink: 0; }
  .list-panel-header h2 { font-family: var(--font-display); font-size: 20px; font-weight: 400; }
  .list-panel-header .count { font-size: 12px; color: var(--text-secondary); font-weight: 300; }

  /* ── Destination List ──────────────────── */
  .destination-list { flex: 1; overflow-y: auto; padding: 0 14px 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .continent-header {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 500;
    padding: 14px 12px 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    user-select: none; transition: color 0.15s;
  }
  .continent-header:hover { color: var(--text-secondary); }
  .continent-header:first-child { padding-top: 4px; }
  .continent-arrow { font-size: 11px; transition: transform 0.25s ease; }
  .continent-header.collapsed .continent-arrow { transform: rotate(-90deg); }
  .continent-group { overflow: hidden; transition: max-height 0.3s ease; }
  .continent-group.collapsed { max-height: 0 !important; }
  .dest-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background 0.15s; display: flex; gap: 10px; align-items: flex-start; }
  .dest-item:hover { background: var(--bg-hover); }
  .dest-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .dest-dot.stage { background: var(--accent-stage); }
  .dest-dot.exchange { background: var(--accent-exchange); }
  .dest-dot.alumni { background: var(--accent-alumni); }
  .dest-info { flex: 1; min-width: 0; }
  .dest-city { font-size: 13px; font-weight: 500; margin-bottom: 1px; }
  .dest-student { font-size: 12px; color: var(--text-secondary); font-weight: 400; margin-top: 1px; }
  .dest-detail { font-size: 11px; color: var(--text-muted); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .dest-year { font-size: 10px; color: var(--text-muted); font-weight: 400; white-space: nowrap; margin-top: 4px; }

  /* ── Popup ──────────────────────────────── */
  .mapboxgl-popup-content { background: var(--bg-panel) !important; border: 1px solid var(--border) !important; border-radius: 14px !important; padding: 22px 24px !important; color: var(--text-primary) !important; font-family: var(--font-body) !important; box-shadow: 0 20px 60px rgba(0,0,0,0.5) !important; min-width: 240px; }
  .mapboxgl-popup-tip { border-top-color: var(--bg-panel) !important; }
  .mapboxgl-popup-close-button { color: var(--text-muted) !important; font-size: 20px !important; right: 10px !important; top: 8px !important; }
  .popup-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; margin-bottom: 2px; }
  .popup-type.stage { color: var(--accent-stage); }
  .popup-type.exchange { color: var(--accent-exchange); }
  .popup-type.alumni { color: var(--accent-alumni); }
  .popup-subline { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; font-weight: 400; }
  .popup-student { font-family: var(--font-display); font-size: 24px; line-height: 1.15; margin-bottom: 4px; }
  .popup-link { display: inline-block; font-size: 11.5px; color: var(--text-muted); text-decoration: none; margin-bottom: 4px; transition: color 0.15s; }
  .popup-link:hover { color: var(--text-primary); }
  .popup-section { padding-top: 12px; margin-top: 8px; border-top: 1px solid var(--border); }
  .popup-org { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .popup-specialization { font-size: 12.5px; color: var(--text-secondary); font-weight: 300; font-style: italic; margin-bottom: 3px; }
  .popup-location { font-size: 13px; color: var(--text-secondary); font-weight: 300; }

  /* ── Cluster Popup Navigation ──────────── */
  .popup-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 14px; margin-top: 6px; border-top: 1px solid var(--border);
  }
  .popup-nav-btn {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-secondary); width: 32px; height: 32px; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .popup-nav-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .popup-nav-counter { font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; }

  /* ── Search Bar (floating top center) ────── */
  .search-wrap {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(calc(-50% + (var(--panel-left-w) - var(--panel-right-w)) / 2));
    width: min(420px, calc(100vw - var(--panel-left-w) - var(--panel-right-w) - 140px));
    z-index: 12;
    height: 44px;
  }
  .search-input {
    width: 100%; height: 44px;
    padding: 0 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    backdrop-filter: blur(30px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--text-secondary); }
  .search-icon {
    position: absolute; left: 15px; top: 0; height: 44px;
    display: flex; align-items: center;
    color: var(--text-muted); pointer-events: none;
  }
  .search-clear {
    position: absolute; right: 10px; top: 0; height: 44px;
    display: none; align-items: center; justify-content: center;
    background: none; border: none; color: var(--text-muted);
    font-size: 18px; cursor: pointer; padding: 0 6px; line-height: 1;
  }
  .search-clear:hover { color: var(--text-primary); }
  .search-results {
    position: absolute; left: 0; right: 0; top: 100%; margin-top: 6px;
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px;
    max-height: 300px; overflow-y: auto; z-index: 20; display: none;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .search-results.visible { display: block; }
  .search-result-item {
    padding: 10px 16px; cursor: pointer; transition: background 0.12s;
    border-bottom: 1px solid var(--border);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--bg-hover); }
  .search-result-city { font-size: 13px; font-weight: 500; }
  .search-result-detail { font-size: 11px; color: var(--text-secondary); font-weight: 300; margin-top: 1px; }
  .search-result-match { color: var(--accent-title); font-weight: 500; }
  .search-no-result { padding: 12px 16px; font-size: 12px; color: var(--text-muted); }

  /* ── Responsive ─────────────────────────── */
  @media (max-width: 900px) { .panel-right, #toggleRight { display: none; } .search-wrap { left: 50%; transform: translateX(-50%); width: min(420px, calc(100vw - var(--panel-left-w) - 100px)); } }
  @media (max-width: 768px) {
    .panel-left { top: auto; bottom: 0; left: 0; right: 0; width: 100%; height: 55vh; border-radius: 20px 20px 0 0; }
    .panel-left.collapsed { transform: translateY(calc(100% - 60px)); }
    #toggleLeft { display: none; }
    .search-wrap { left: 20px; right: 20px; width: auto; transform: none; top: 16px; }
  }

  /* ── Animations ────────────────────────── */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .panel-header, .stats-row, .filters { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
  .stats-row { animation-delay: 0.05s; }
  .filters { animation-delay: 0.1s; }

  .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { opacity: 0.4; transition: opacity 0.2s; }
  .mapboxgl-ctrl-bottom-left:hover, .mapboxgl-ctrl-bottom-right:hover { opacity: 1; }
</style>
</head>
<body>

<div id="map"></div>

<!-- FLOATING SEARCH BAR -->
<div class="search-wrap" id="searchWrap">
  <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un nom, une ville, une entreprise…" autocomplete="off">
  <button class="search-clear" id="searchClear">×</button>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- LEFT PANEL: Stats & Filters -->
<div class="panel-base panel-left" id="panelLeft">
  <div class="panel-header">
    <h1>Cartographie des <em>Stratos</em></h1>
    <p class="subtitle">Stages, échanges académiques & alumni</p>
  </div>
  <div class="stats-row">
    <div class="stat-card stages"><div class="number" id="countStages">0</div><div class="label">Stages</div></div>
    <div class="stat-card exchanges"><div class="number" id="countExchanges">0</div><div class="label">Échanges</div></div>
    <div class="stat-card alumni"><div class="number" id="countAlumni">0</div><div class="label">Alumni</div></div>
  </div>
  <div class="stats-row" style="padding-top:0">
    <div class="stat-card"><div class="number" id="countStratos">0</div><div class="label">Stratos</div></div>
    <div class="stat-card"><div class="number" id="countCities">0</div><div class="label">Villes</div></div>
    <div class="stat-card"><div class="number" id="countCountries">0</div><div class="label">Pays</div></div>
  </div>
  <div class="filters">
    <div class="filter-group">
      <div class="filter-label">Campus</div>
      <div class="filter-chips" id="campusFilters"><button class="chip active" data-filter="all">Tous</button></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Type</div>
      <div class="filter-chips" id="typeFilters">
        <button class="chip active" data-filter="all">Tous</button>
        <button class="chip stage-chip" data-filter="stage">Stages</button>
        <button class="chip exchange-chip" data-filter="exchange">Échanges</button>
        <button class="chip alumni-chip" data-filter="alumni">Alumni</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Promotion</div>
      <div class="filter-chips" id="promoFilters"><button class="chip active" data-filter="all">Toutes</button></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Année académique</div>
      <div class="filter-chips" id="yearFilters"><button class="chip active" data-filter="all">Toutes</button></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Spécialisation</div>
      <div class="filter-chips" id="specFilters"><button class="chip active" data-filter="all">Toutes</button></div>
    </div>
  </div>
  <div class="school-banner">Strate, École de Design — Lyon</div>
</div>
<button class="toggle-btn" id="toggleLeft">☰</button>

<!-- RIGHT PANEL: Destination List -->
<div class="panel-base panel-right" id="panelRight">
  <div class="list-panel-header">
    <h2>Destinations</h2>
    <span class="count" id="listCount">0 destinations</span>
  </div>
  <div class="destination-list" id="destinationList"></div>
</div>
<button class="toggle-btn" id="toggleRight">☰</button>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-0YFn6d_UV6M6IPHTgm_Twik3wWjmXI1pAH3lfg3ACTn_mHc9Nr7EQP0X9tDQCAT6EVVKnSwu-VyR/pub?gid=0&single=true&output=csv';
let destinations = [];

async function loadData() {
  try {
    const r = await fetch(SHEET_URL); destinations = parseCSV(await r.text());
  } catch (e) {
    console.error('Erreur chargement:', e);
    destinations = [
      { student:"Paul C", promo:2025, type:"stage", country:"France", city:"Lyon", lat:45.764, lng:4.8357, org:"Strate", specialization:"Design produit", linkedin:"", website:"", campus:"Lyon", academicYear:"2024-2025" },
      { student:"Léa Capaloux", promo:2024, type:"stage", country:"Japon", city:"Tokyo", lat:35.6762, lng:139.6503, org:"ULTRA LAB Design", specialization:"Design industriel", linkedin:"", website:"", campus:"Lyon", academicYear:"2023-2024" },
      { student:"Baptiste Romarion", promo:2026, type:"exchange", country:"Suède", city:"Stockholm", lat:59.3293, lng:18.0686, org:"Konstfack", specialization:"Design interaction", linkedin:"", website:"", campus:"Paris", academicYear:"2024-2025" },
    ];
  }
  destinations.forEach((d,i) => d._origIndex = i);
  buildCampusFilters(); buildPromoFilters(); buildYearFilters(); buildSpecFilters(); createMarkers(); updateView();
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,'').toLowerCase());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const values = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) { const c = line[i]; if (c==='"') inQ=!inQ; else if (c===','&&!inQ){values.push(cur.trim());cur='';} else cur+=c; }
    values.push(cur.trim());
    const obj = {}; headers.forEach((h,i) => obj[h] = values[i]||'');
    const raw = (obj.type||obj.statut||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    let type = 'stage'; if (raw.includes('change')) type='exchange'; else if (raw.includes('alumni')) type='alumni';
    const prenom = obj['prénom']||obj.prenom||obj.firstname||obj['first name']||'';
    const nom = obj.nom||obj.name||obj.lastname||obj['last name']||'';
    const studentFallback = obj.student||obj.etudiant||obj['étudiant']||'';
    const student = (prenom||nom) ? `${prenom} ${nom}`.trim() : studentFallback;
    return {
      student,
      promo: parseInt(obj.promo||obj.promotion||obj['année']||obj.annee),
      type, country: obj.country||obj.pays||'', city: obj.city||obj.ville||'',
      lat: parseFloat(obj.lat||obj.latitude), lng: parseFloat(obj.lng||obj.longitude),
      org: obj.org||obj.organisation||obj.entreprise||obj['école']||obj.ecole||'',
      specialization: obj.specialization||obj['spécialisation']||obj.specialisation||obj['spécialisations']||obj.specialisations||obj['spécialité']||obj.specialite||'',
      linkedin: obj.linkedin||obj['linkedin url']||'',
      website: obj.website||obj['url org']||obj['site']||obj['site web']||obj['url']||'',
      campus: obj.campus||'',
      academicYear: obj['année académique']||obj['annee academique']||obj['academic year']||obj['année_académique']||obj['annee_academique']||'',
    };
  }).filter(d => !isNaN(d.lat) && !isNaN(d.lng));
}

const CC = {
  'france':'Europe','allemagne':'Europe','espagne':'Europe','italie':'Europe','royaume-uni':'Europe','angleterre':'Europe',
  'pays-bas':'Europe','belgique':'Europe','suisse':'Europe','suède':'Europe','norvège':'Europe','danemark':'Europe',
  'finlande':'Europe','portugal':'Europe','irlande':'Europe','autriche':'Europe','pologne':'Europe',
  'république tchèque':'Europe','tchéquie':'Europe','grèce':'Europe','hongrie':'Europe','roumanie':'Europe',
  'islande':'Europe','croatie':'Europe','écosse':'Europe','ecosse':'Europe','luxembourg':'Europe',
  'estonie':'Europe','lettonie':'Europe','lituanie':'Europe','slovénie':'Europe','slovaquie':'Europe',
  'serbie':'Europe','bulgarie':'Europe','malte':'Europe','chypre':'Europe','monténégro':'Europe',
  'bosnie':'Europe','albanie':'Europe','macédoine':'Europe','ukraine':'Europe','turquie':'Europe',
  'japon':'Asie','chine':'Asie','corée du sud':'Asie','corée':'Asie','inde':'Asie','thaïlande':'Asie',
  'vietnam':'Asie','indonésie':'Asie','malaisie':'Asie','singapour':'Asie','philippines':'Asie',
  'taïwan':'Asie','taiwan':'Asie','hong kong':'Asie','sri lanka':'Asie','népal':'Asie','cambodge':'Asie',
  'pakistan':'Asie','israël':'Asie','liban':'Asie','jordanie':'Asie','émirats arabes unis':'Asie','qatar':'Asie','arabie saoudite':'Asie',

let activeTypes=new Set(), activePromos=new Set(), activeSpecs=new Set(), activeCampus=new Set(), activeYears=new Set(), currentPopup=null;

function setupMultiFilter(id, set, parse) {
  document.getElementById(id).addEventListener('click', e => {
    const chip = e.target.closest('.chip'); if(!chip) return;
    const f = chip.dataset.filter;
    if(f==='all'){ set.clear(); document.querySelectorAll(`#${id} .chip`).forEach(c=>c.classList.remove('active')); chip.classList.add('active'); }
    else {
      document.querySelector(`#${id} .chip[data-filter="all"]`).classList.remove('active');
      const v = parse?parse(f):f;
      if(set.has(v)){set.delete(v);chip.classList.remove('active');}else{set.add(v);chip.classList.add('active');}
      if(set.size===0) document.querySelector(`#${id} .chip[data-filter="all"]`).classList.add('active');
    }
    updateView();
  });
}

}

function initSearch() {
  const input = document.getElementById('searchInput');
  const clearBtn = document.getElementById('searchClear');
  const resultsEl = document.getElementById('searchResults');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    clearBtn.style.display = q ? 'flex' : 'none';
    if (q.length < 2) { resultsEl.classList.remove('visible'); return; }
    const matches = destinations.filter(d => {
      return [d.student, d.city, d.country, d.org, d.specialization, d.campus, d.academicYear, String(d.promo)]
        .some(f => (f||'').toLowerCase().includes(q));
    }).slice(0, 12);

    resultsEl.innerHTML = '';
    if (matches.length === 0) {
      resultsEl.innerHTML = '<div class="search-no-result">Aucun résultat</div>';
    } else {
      matches.forEach(d => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.innerHTML = `
          <div class="search-result-city">${highlight(d.student, q)} · ${highlight(d.city, q)}, ${d.country}</div>
          <div class="search-result-detail">${highlight(d.org, q)}${d.specialization ? ' · ' + highlight(d.specialization, q) : ''} — ${d.promo}</div>
        `;
        item.addEventListener('click', () => {
          openPopup(d);
          resultsEl.classList.remove('visible');
          input.value = d.student;
          clearBtn.style.display = 'flex';
        });
        resultsEl.appendChild(item);
      });
    }
    resultsEl.classList.add('visible');
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.style.display = 'none';
    resultsEl.classList.remove('visible');
  });

  // Fermer résultats si clic en dehors
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) resultsEl.classList.remove('visible');
  });
}

function highlight(text, query) {
  if (!text || !query) return text || '';
  const idx = text.toLowerCase().indexOf(query);
  if (idx === -1) return text;
  return text.slice(0, idx) + '<span class="search-result-match">' + text.slice(idx, idx + query.length) + '</span>' + text.slice(idx + query.length);
}

function updateMapPadding(){
  const lOpen=!document.getElementById('panelLeft').classList.contains('collapsed');
  const rOpen=!document.getElementById('panelRight').classList.contains('collapsed');
  const mob=window.innerWidth<=768;
  if(mob) map.easeTo({padding:{top:0,left:0,right:0,bottom:lOpen?window.innerHeight*0.55:0},duration:400});
  else map.easeTo({padding:{top:0,left:lOpen?440:0,right:rOpen?380:0,bottom:0},duration:400});
}

const TC={stage:'#5EBD8C',exchange:'#6FA3EF',alumni:'#A78BFA'};
function toGJ(data){return{type:'FeatureCollection',features:data.map(d=>({type:'Feature',geometry:{type:'Point',coordinates:[d.lng,d.lat]},properties:{type:d.type,_origIndex:d._origIndex}}))};}

function createMarkers(){
  ['glow-stage','glow-exchange','glow-alumni','unclustered-stage','unclustered-exchange','unclustered-alumni'].forEach(id=>{if(map.getLayer(id))map.removeLayer(id);});
  if(map.getSource('destinations'))map.removeSource('destinations');
  map.addSource('destinations',{type:'geojson',data:toGJ(destinations)});
  ['stage','exchange','alumni'].forEach(t=>{
    // Glow layer
    map.addLayer({id:`glow-${t}`,type:'circle',source:'destinations',filter:['==',['get','type'],t],paint:{'circle-color':TC[t],'circle-radius':14,'circle-blur':1,'circle-opacity':0.3}});
    // Main point
    map.addLayer({id:`unclustered-${t}`,type:'circle',source:'destinations',filter:['==',['get','type'],t],paint:{'circle-color':TC[t],'circle-radius':6,'circle-stroke-width':0,'circle-opacity':0.95}});
  });
  ['unclustered-stage','unclustered-exchange','unclustered-alumni'].forEach(id=>{
    map.on('click',id,e=>{const d=destinations[e.features[0].properties._origIndex];if(d)openPopup(d);});
  });
  ['unclustered-stage','unclustered-exchange','unclustered-alumni'].forEach(id=>{
    map.on('mouseenter',id,()=>{map.getCanvas().style.cursor='pointer';});
    map.on('mouseleave',id,()=>{map.getCanvas().style.cursor='';});
  });
}

function getTypeLabel(t){return t==='exchange'?'Échange':t==='alumni'?'Alumni':'Stage';}

function openPopup(d){
  if(currentPopup)currentPopup.remove();
  currentPopup=new mapboxgl.Popup({offset:18,closeButton:true,maxWidth:'300px'})
    .setLngLat([d.lng,d.lat])
    .setHTML(popupHTML(d))
    .addTo(map);
  map.flyTo({center:[d.lng,d.lat],zoom:Math.max(map.getZoom(),4),duration:1200,essential:true});
}

function popupHTML(d) {
  const subParts = [];
  if(d.promo) subParts.push('Promo '+d.promo);
  if(d.campus) subParts.push('Strate '+d.campus);
  const yearLabel = d.academicYear ? ' | '+d.academicYear : '';
  return `
    <div class="popup-type ${d.type}">${getTypeLabel(d.type)}${yearLabel}</div>
    ${subParts.length?`<div class="popup-subline">${subParts.join(' · ')}</div>`:''}
    <div class="popup-student">${d.student}</div>
    ${d.linkedin?`<a class="popup-link" href="${d.linkedin}" target="_blank" rel="noopener">Profil LinkedIn ↗</a>`:''}
    <div class="popup-section">
      <div class="popup-org">${d.org}</div>
      ${d.specialization?`<div class="popup-specialization">${d.specialization}</div>`:''}
      ${d.website?`<a class="popup-link" href="${d.website}" target="_blank" rel="noopener">Site web ↗</a>`:''}
    </div>
    <div class="popup-section"><div class="popup-location">${d.city}, ${d.country}</div></div>
  `;
}

function openClusterPopup(items, coords) {
  if(currentPopup) currentPopup.remove();
  let idx = 0;

  function render() {
    const d = items[idx];
    const nav = items.length > 1 ? `
      <div class="popup-nav">
        <button class="popup-nav-btn" id="popupPrev">‹</button>
        <span class="popup-nav-counter">${idx+1} / ${items.length}</span>
        <button class="popup-nav-btn" id="popupNext">›</button>
      </div>
    ` : '';
    return `<div id="clusterPopupContent">${popupHTML(d)}${nav}</div>`;
  }

  currentPopup = new mapboxgl.Popup({offset:18, closeButton:true, maxWidth:'300px'})
    .setLngLat(coords)
    .setHTML(render())
    .addTo(map);

  function attachNav() {
    const prev = document.getElementById('popupPrev');
    const next = document.getElementById('popupNext');
    if(prev) prev.addEventListener('click', (e) => { e.stopPropagation(); idx = (idx - 1 + items.length) % items.length; update(); });
    if(next) next.addEventListener('click', (e) => { e.stopPropagation(); idx = (idx + 1) % items.length; update(); });
  }

  function update() {
    const el = document.getElementById('clusterPopupContent');
    if(el) { el.innerHTML = popupHTML(items[idx]) + (items.length > 1 ? `<div class="popup-nav"><button class="popup-nav-btn" id="popupPrev">‹</button><span class="popup-nav-counter">${idx+1} / ${items.length}</span><button class="popup-nav-btn" id="popupNext">›</button></div>` : ''); attachNav(); }
  }

  attachNav();
}

function updateView(){
  const filtered=destinations.filter(d=>{
    return (activeCampus.size===0||activeCampus.has(d.campus))&&(activeTypes.size===0||activeTypes.has(d.type))&&(activePromos.size===0||activePromos.has(d.promo))&&(activeYears.size===0||activeYears.has(d.academicYear))&&(activeSpecs.size===0||activeSpecs.has(d.specialization));
  });
  const src=map.getSource('destinations'); if(src)src.setData(toGJ(filtered));

  // Stats
  document.getElementById('countStages').textContent=filtered.filter(d=>d.type==='stage').length;
  document.getElementById('countExchanges').textContent=filtered.filter(d=>d.type==='exchange').length;
  document.getElementById('countAlumni').textContent=filtered.filter(d=>d.type==='alumni').length;
  const uStudents=new Set(filtered.map(d=>d.student).filter(s=>s));
  const uCities=new Set(filtered.map(d=>`${d.city}-${d.country}`));
  const uCountries=new Set(filtered.map(d=>d.country));
  document.getElementById('countStratos').textContent=uStudents.size;
  document.getElementById('countCities').textContent=uCities.size;
  document.getElementById('countCountries').textContent=uCountries.size;

  // List
  if(!window._collapsedContinents) window._collapsedContinents = new Set();
  const groups={};
  filtered.forEach(d=>{const c=getContinent(d.country);if(!groups[c])groups[c]=[];groups[c].push(d);});
  Object.values(groups).forEach(a=>a.sort((a,b)=>a.city.localeCompare(b.city,'fr')));
  const sorted=Object.keys(groups).sort((a,b)=>CO.indexOf(a)-CO.indexOf(b));
  const list=document.getElementById('destinationList'); list.innerHTML='';
  sorted.forEach(cont=>{
    const uniqueCitiesCont = new Set(groups[cont].map(d=>`${d.city}-${d.country}`));
    const isCollapsed = window._collapsedContinents.has(cont);
    const h=document.createElement('div');
    h.className='continent-header'+(isCollapsed?' collapsed':'');
    h.innerHTML=`<span>${cont} (${uniqueCitiesCont.size})</span><span class="continent-arrow">▼</span>`;
    h.addEventListener('click',()=>{
      h.classList.toggle('collapsed');
      grp.classList.toggle('collapsed');
      if(h.classList.contains('collapsed')) window._collapsedContinents.add(cont);
      else window._collapsedContinents.delete(cont);
    });
    list.appendChild(h);
    const grp=document.createElement('div');
    grp.className='continent-group'+(isCollapsed?' collapsed':'');
    groups[cont].forEach(d=>{
      const item=document.createElement('div');item.className='dest-item';
      item.innerHTML=`<div class="dest-dot ${d.type}"></div><div class="dest-info"><div class="dest-city">${d.city}, ${d.country}</div><div class="dest-student">${d.student}${d.promo?' · Promo '+d.promo:''}</div><div class="dest-detail">${d.org}${d.specialization?' · '+d.specialization:''}</div></div>${d.academicYear?`<div class="dest-year">${d.academicYear}</div>`:''}`;
      item.addEventListener('click',()=>openPopup(d));grp.appendChild(item);
    });
    list.appendChild(grp);
  });
  document.getElementById('listCount').textContent=`${uCities.size} destination${uCities.size>1?'s':''}`;
}
